<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數學助手 — MathAI</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    .chat-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .chat-header {
      background: linear-gradient(135deg, #4a90d9, #67b26f);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-md);
    }

    .chat-user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-user-avatar {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .chat-user-details h2 {
      font-size: 18px;
      font-weight: 700;
    }

    .chat-user-details p {
      font-size: 13px;
      opacity: 0.85;
    }

    .chat-header-actions {
      display: flex;
      gap: 8px;
    }

    .header-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
    }

    .header-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .chat-main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 20px;
      background: #f5f7fa;
    }

    .chat-widget-container {
      width: 100%;
      max-width: 600px;
    }

    .chat-help-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,107,107,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .chat-help-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 24px rgba(255,107,107,0.5);
    }

    /* Help Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 32px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .modal-content h3 {
      font-size: 22px;
      margin-bottom: 16px;
      color: #333;
    }

    .modal-content p {
      color: #666;
      margin-bottom: 24px;
    }

    .modal-btn {
      padding: 14px 32px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 0 8px;
    }

    .modal-btn.primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .modal-btn.secondary {
      background: #f0f0f0;
      color: #333;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .loading-overlay .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #f0f0f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p>載入中...</p>
  </div>

  <div class="chat-page">
    <header class="chat-header">
      <div class="chat-user-info">
        <div class="chat-user-avatar">👤</div>
        <div class="chat-user-details">
          <h2 id="student-name">載入中...</h2>
          <p id="student-class">-</p>
        </div>
      </div>
      <div class="chat-header-actions">
        <button class="header-btn" id="logout-btn" title="登出">🚪</button>
      </div>
    </header>

    <main class="chat-main">
      <div class="chat-widget-container">
        <div id="chat-widget-mount"></div>
      </div>
    </main>

    <button class="chat-help-btn" id="help-btn" title="需要幫助？">❓</button>

    <!-- Help Modal -->
    <div class="modal-overlay" id="help-modal">
      <div class="modal-content">
        <h3>🚨 需要老師幫忙？</h3>
        <p>老師會即時收到通知，馬上來幫你！</p>
        <button class="modal-btn primary" id="call-teacher-btn">係，叫老師幫我！</button>
        <button class="modal-btn secondary" id="close-help-btn">我可以自己試</button>
      </div>
    </div>
  </div>

  <script src="../js/ChatWidget.js"></script>
  <script>
    // ========================================
    // Phase 5: Session-based Auth
    // ========================================

    const session = localStorage.getItem('mathai_session');
    const student = JSON.parse(localStorage.getItem('mathai_student') || 'null');
    const mode = localStorage.getItem('mathai_mode') || 'guest';

    if (!session || !student) {
      window.location.href = '/pages/login.html';
      throw new Error('No session');
    }

    // Remove loading
    document.getElementById('loading').style.display = 'none';

    // Update header
    document.getElementById('student-name').textContent = student.name;
    document.getElementById('student-class').textContent = `${student.class_id} 數學班`;

    // ========================================
    // Init ChatWidget with session identity
    // ========================================
    const mountEl = document.getElementById('chat-widget-mount');
    const chatWidget = new MathAI.ChatWidget({
      container: mountEl,
      studentId: student.id,
      studentName: student.name,
      classId: student.class_id,
      ability: student.ability || 'medium',
      streamUrl: '/api/llm/stream',
      voiceEnabled: true,
      onMessage: (userMsg, botMsg) => {
        // Send heartbeat with message count increment
        fetch(`/api/sessions/${session}/heartbeat`, { method: 'POST' }).catch(() => {});
      }
    });

    // ========================================
    // Logout
    // ========================================
    document.getElementById('logout-btn').addEventListener('click', async () => {
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: session })
        });
      } catch (e) {}

      localStorage.removeItem('mathai_session');
      localStorage.removeItem('mathai_student');
      localStorage.removeItem('mathai_mode');
      window.location.href = '/pages/login.html';
    });

    // ========================================
    // Help Modal
    // ========================================
    const helpBtn = document.getElementById('help-btn');
    const helpModal = document.getElementById('help-modal');
    const callTeacherBtn = document.getElementById('call-teacher-btn');
    const closeHelpBtn = document.getElementById('close-help-btn');

    helpBtn.addEventListener('click', () => {
      helpModal.classList.add('show');
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance('你想叫老師幫你嗎？');
        utterance.lang = 'zh-HK';
        window.speechSynthesis.speak(utterance);
      }
    });

    closeHelpBtn.addEventListener('click', () => {
      helpModal.classList.remove('show');
    });

    callTeacherBtn.addEventListener('click', async () => {
      try {
        await fetch('/api/help', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id: student.id, class_id: student.class_id })
        });
      } catch (e) {}

      helpModal.classList.remove('show');
      alert('✅ 老師已收到通知！');
    });

    // Heartbeat every 30s
    setInterval(() => {
      fetch(`/api/sessions/${session}/heartbeat`, { method: 'POST' }).catch(() => {});
    }, 30000);
  </script>
</body>
</html>
