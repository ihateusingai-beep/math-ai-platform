<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生詳情 — MathAI 教師版</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    .detail-page {
      padding: 24px 0;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .detail-avatar {
      width: 80px;
      height: 80px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
    }

    .detail-info h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .detail-info p {
      color: var(--text-muted);
    }

    .detail-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .detail-stat {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }

    .detail-stat-value {
      font-size: 32px;
      font-weight: bold;
      color: var(--primary);
    }

    .detail-stat-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .chat-history {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }

    .chat-history h2 {
      font-size: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .message-item {
      padding: 16px;
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      border-left: 4px solid var(--border);
    }

    .message-item.user {
      background: #e3f2fd;
      border-left-color: var(--primary);
    }

    .message-item.bot {
      background: #f5f5f5;
      border-left-color: var(--success);
    }

    .message-item.help {
      background: #fff3cd;
      border-left-color: var(--warning);
    }

    .message-time {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .message-content {
      font-size: 16px;
      line-height: 1.5;
    }

    .message-response {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
      font-size: 14px;
      color: var(--text-muted);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--bg-light);
      border: 2px solid var(--border);
      border-radius: var(--radius-xl);
      color: var(--text-dark);
      text-decoration: none;
      font-size: 16px;
      transition: all 0.2s;
      margin-bottom: 24px;
    }

    .back-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <div class="header-content">
          <a href="/math-ai-platform/" class="logo">
            <span class="logo-icon">🔢</span>
            <span>MathAI 教師版</span>
          </a>
          <nav class="nav-links">
            <a href="/math-ai-platform/">學生版</a>
            <a href="/pages/dashboard.html" style="background: rgba(255,255,255,0.2);">Dashboard</a>
          </nav>
        </div>
      </div>
    </header>

    <!-- Detail Content -->
    <main class="detail-page">
      <div class="container">
        <a href="/pages/dashboard.html" class="back-btn">← 返回Dashboard</a>

        <!-- Student Header -->
        <div class="detail-header">
          <div class="detail-avatar" id="student-avatar">?</div>
          <div class="detail-info">
            <h1 id="student-name">載入中...</h1>
            <p id="student-class">P1A 數學班</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="detail-stats" id="detail-stats">
          <div class="detail-stat">
            <div class="detail-stat-value" id="stat-questions">-</div>
            <div class="detail-stat-label">總問題數</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-value" id="stat-accuracy">-%</div>
            <div class="detail-stat-label">正確率</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-value" id="stat-helps">-</div>
            <div class="detail-stat-label">求助次數</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-value" id="stat-sessions">-</div>
            <div class="detail-stat-label">使用次數</div>
          </div>
        </div>

        <!-- Chat History -->
        <div class="chat-history">
          <h2>💬 最近對話</h2>
          <div id="chat-history-list">
            <p style="color:var(--text-muted);text-align:center;">載入中...</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        MathAI 數學助手 — 匡智張玉瓊晨輝學校
      </div>
    </footer>
  </div>

  <script>
    // ========================================
    // URL 參數獲取學生ID
    // ========================================
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('id') || 'p1a-01';

    const API_BASE = '';

    // ========================================
    // Mock 學生數據（API 失敗時 fallback）
    // ========================================
    const MOCK_STUDENTS = {
      'p1a-01': { name: '張鈞保', class: 'P1A', ability: 'high' },
      'p1a-02': { name: '陳大文', class: 'P1A', ability: 'medium' },
      'p1a-03': { name: '李小红', class: 'P1A', ability: 'medium' },
      'p1a-04': { name: '王小明', class: 'P1A', ability: 'low' },
      'p1a-05': { name: '陳志明', class: 'P1A', ability: 'medium' },
      'p2a-01': { name: '周芷若', class: 'P2A', ability: 'high' },
      'p2a-02': { name: '吳俊傑', class: 'P2A', ability: 'medium' },
      'p2a-03': { name: '孫文斌', class: 'P2A', ability: 'medium' },
      'p2a-04': { name: '鄭凱文', class: 'P2A', ability: 'low' },
      'p2a-05': { name: '何美琪', class: 'P2A', ability: 'medium' },
      's1b-01': { name: '祝卓鋒', class: 'S1B', ability: 'high' },
      's1b-02': { name: '黃曉明', class: 'S1B', ability: 'medium' },
      's1b-03': { name: '林志玲', class: 'S1B', ability: 'medium' },
      's1b-04': { name: '張偉豪', class: 'S1B', ability: 'low' },
      's1b-05': { name: '劉德華', class: 'S1B', ability: 'medium' }
    };

    const MOCK_MESSAGES = {
      'p1a-01': [
        { time: '10:32', user: '2加3係幾多？', bot: '2 + 3 = 5 ✅', type: 'user' },
        { time: '10:28', user: '三角形有幾多條邊？', bot: '三角形有 3 條邊！你可以數下 ✅', type: 'user' },
        { time: '10:20', user: '好難...', bot: '唔緊要！我哋慢慢試，你已經好勁喇 💪', type: 'help' }
      ],
      's1b-01': [
        { time: '10:25', user: '一元二次方程點樣做？', bot: '首先睇下 a、b、c 係乜...（需要MiniMax詳細回覆）', type: 'user' },
        { time: '10:15', user: '負數加正數點做？', bot: '-3 + 5 = 2，想像欠3蚊再搵5蚊...', type: 'user' }
      ]
    };

    // ========================================
    // 獲取學生詳情
    // ========================================
    async function fetchStudentDetail() {
      try {
        const res = await fetch(`${API_BASE}/api/students/${studentId}`);
        const data = await res.json();

        if (data.success) {
          renderStudentDetail(data.data);
          return;
        }
      } catch (err) {
        console.warn('[Student Detail] API unavailable, using mock data');
      }

      // Fallback to mock data
      renderStudentDetail(MOCK_STUDENTS[studentId] || MOCK_STUDENTS['p1a-01']);
    }

    function renderStudentDetail(student) {
      // Header
      document.getElementById('student-avatar').textContent = student.name.charAt(0);
      document.getElementById('student-name').textContent = student.name;
      document.getElementById('student-class').textContent = `${student.class} 數學班 — ${getAbilityLabel(student.ability)}`;

      // Stats（mock）
      const messages = MOCK_MESSAGES[studentId] || [];
      document.getElementById('stat-questions').textContent = messages.length + 5;
      document.getElementById('stat-accuracy').textContent = '78%';
      document.getElementById('stat-helps').textContent = messages.filter(m => m.type === 'help').length || 0;
      document.getElementById('stat-sessions').textContent = Math.floor(Math.random() * 5) + 1;

      // Chat history
      renderChatHistory(messages);
    }

    function getAbilityLabel(ability) {
      const labels = { 'high': '🟢 高能力', 'medium': '🟡 中度', 'low': '🔵 輕度' };
      return labels[ability] || labels['medium'];
    }

    function renderChatHistory(messages) {
      const list = document.getElementById('chat-history-list');

      if (!messages || messages.length === 0) {
        list.innerHTML = '<p style="color:var(--text-muted);text-align:center;">暫時冇對話記錄</p>';
        return;
      }

      list.innerHTML = messages.map(m => `
        <div class="message-item ${m.type}">
          <div class="message-time">${m.time}</div>
          <div class="message-content"><strong>學生：</strong>${m.user}</div>
          <div class="message-response"><strong>MathAI：</strong>${m.bot}</div>
        </div>
      `).join('');
    }

    // ========================================
    // 初始化
    // ========================================
    fetchStudentDetail();
  </script>
</body>
</html>
