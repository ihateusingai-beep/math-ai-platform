<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數學助手 — MathAI</title>
  <link rel="stylesheet" href="/math-ai-platform/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    .chat-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .chat-header {
      background: linear-gradient(135deg, #4a90d9, #67b26f);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-md);
    }

    .chat-user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-user-avatar {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .chat-user-name {
      font-size: 20px;
      font-weight: bold;
    }

    .chat-user-class {
      font-size: 14px;
      opacity: 0.8;
    }

    .chat-back-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius-xl);
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .chat-back-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .chat-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg-light);
    }

    .chat-widget-container {
      width: 100%;
      max-width: 700px;
    }

    .chat-help-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 64px;
      height: 64px;
      background: var(--warning);
      color: var(--text-dark);
      border: none;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      box-shadow: var(--shadow-lg);
      transition: all 0.2s;
      z-index: 100;
    }

    .chat-help-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    }

    .help-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .help-modal.show {
      display: flex;
    }

    .help-modal-content {
      background: white;
      border-radius: var(--radius-lg);
      padding: 32px;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    .help-modal-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .help-modal-text {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .help-modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="chat-page">
    <!-- Header -->
    <header class="chat-header">
      <div class="chat-user-info">
        <div class="chat-user-avatar">👤</div>
        <div>
          <div class="chat-user-name" id="student-name">張鈞保</div>
          <div class="chat-user-class" id="student-class">P1A 數學班</div>
        </div>
      </div>
      <a href="javascript:history.back()" class="chat-back-btn">← 返回</a>
    </header>

    <!-- Chat Widget -->
    <main class="chat-main">
      <div class="chat-widget-container">
        <div id="chat-widget-mount"></div>
      </div>
    </main>

    <!-- Help Button -->
    <button class="chat-help-btn" id="help-btn" title="需要幫助？">❓</button>

    <!-- Help Modal -->
    <div class="help-modal" id="help-modal">
      <div class="help-modal-content">
        <div class="help-modal-title">🎓 需要老師幫助？</div>
        <p class="help-modal-text">老師會立即知道你想求助</p>
        <div class="help-modal-actions">
          <button class="btn btn-primary btn-lg" id="call-teacher-btn">叫老師幫我 ✓</button>
          <button class="btn btn-secondary btn-lg" id="close-help-btn">繼續自己試</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ChatWidget Script -->
  <script src="../js/ChatWidget.js"></script>
  <script>
    // ========================================
    // URL 參數獲取學生信息
    // ========================================
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('student') || 'p1a-01';
    const classId = params.get('class') || 'P1A';
    const subject = params.get('subject') || 'math';

    // ========================================
    // Mock 學生名單（後期從API獲取）
    // ========================================
    const STUDENTS_BY_CLASS = {
      'P1A': [
        { id: 'p1a-01', name: '張鈞保', ability: 'high' },
        { id: 'p1a-02', name: '陳大文', ability: 'medium' },
        { id: 'p1a-03', name: '李小红', ability: 'medium' },
        { id: 'p1a-04', name: '王小明', ability: 'low' },
        { id: 'p1a-05', name: '陳志明', ability: 'medium' }
      ],
      'P2A': [
        { id: 'p2a-01', name: '周芷若', ability: 'high' },
        { id: 'p2a-02', name: '吳俊傑', ability: 'medium' },
        { id: 'p2a-03', name: '孫文斌', ability: 'medium' },
        { id: 'p2a-04', name: '鄭凱文', ability: 'low' },
        { id: 'p2a-05', name: '何美琪', ability: 'medium' }
      ],
      'S1B': [
        { id: 's1b-01', name: '祝卓鋒', ability: 'high' },
        { id: 's1b-02', name: '黃曉明', ability: 'medium' },
        { id: 's1b-03', name: '林志玲', ability: 'medium' },
        { id: 's1b-04', name: '張偉豪', ability: 'low' },
        { id: 's1b-05', name: '劉德華', ability: 'medium' }
      ]
    };

    // 查找當前學生
    const students = STUDENTS_BY_CLASS[classId] || [];
    const currentStudent = students.find(s => s.id === studentId) || students[0];

    // 更新 header
    document.getElementById('student-name').textContent = currentStudent.name;
    const subjectLabels = { math: '數學班', chinese: '中文班', english: '英文班', science: '常識班' };
    document.getElementById('student-class').textContent = `${classId} ${subjectLabels[subject] || '數學班'}`;

    // ========================================
    // 初始化 ChatWidget
    // ========================================
    const mountEl = document.getElementById('chat-widget-mount');
    const chatWidget = new MathAI.ChatWidget({
      container: mountEl,
      studentName: currentStudent.name,
      classId: classId,
      subject: subject,
      voiceEnabled: true,
      onMessage: () => {}
    });

    // ========================================
    // Help Modal 控制
    // ========================================
    const helpBtn = document.getElementById('help-btn');
    const helpModal = document.getElementById('help-modal');
    const callTeacherBtn = document.getElementById('call-teacher-btn');
    const closeHelpBtn = document.getElementById('close-help-btn');

    helpBtn.addEventListener('click', () => {
      helpModal.classList.add('show');

      // 語音提示
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance('你想叫老師幫你嗎？');
        utterance.lang = 'zh-HK';
        window.speechSynthesis.speak(utterance);
      }
    });

    closeHelpBtn.addEventListener('click', () => {
      helpModal.classList.remove('show');
    });

    callTeacherBtn.addEventListener('click', () => {
      // Phase 2: 發送求助信號到後端
      alert('老師會立即收到通知！');
      helpModal.classList.remove('show');

      // 實際實現會發送到 server
      console.log('Teacher called for:', currentStudent.name);
    });

    // 點擊背景關閉
    helpModal.addEventListener('click', (e) => {
      if (e.target === helpModal) {
        helpModal.classList.remove('show');
      }
    });

    // ========================================
    // 頁面卸載時保存 session
    // ========================================
    window.addEventListener('beforeunload', () => {
      sessionStorage.setItem('mathai_student', JSON.stringify({
        studentId,
        classId,
        timestamp: Date.now()
      }));
    });
  </script>
</body>
</html>
