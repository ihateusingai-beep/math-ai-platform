<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 - MathAI 數學助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      background: white;
      border-radius: 24px;
      padding: 40px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo-icon {
      font-size: 64px;
      margin-bottom: 12px;
    }
    
    .logo h1 {
      font-size: 28px;
      color: #333;
    }
    
    .logo p {
      color: #666;
      font-size: 14px;
      margin-top: 4px;
    }
    
    .tab-container {
      display: flex;
      background: #f0f0f0;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }
    
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      transition: all 0.3s;
    }
    
    .tab.active {
      background: white;
      color: #667eea;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .form-section {
      display: none;
    }
    
    .form-section.active {
      display: block;
    }
    
    .input-group {
      margin-bottom: 16px;
    }
    
    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    
    .input-group input, .input-group select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-msg {
      background: #ffe0e0;
      color: #c00;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    
    .error-msg.show {
      display: block;
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
    }
    
    .class-code-box {
      background: linear-gradient(135deg, #667eea20, #764ba220);
      border: 2px dashed #667eea;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .class-code-box .label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    
    .class-code-box .code {
      font-size: 28px;
      font-weight: 800;
      color: #667eea;
      letter-spacing: 4px;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f0f0f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">🔢</div>
      <h1>MathAI 數學助手</h1>
      <p>你的個人數學學習夥伴</p>
    </div>
    
    <div id="error-msg" class="error-msg"></div>
    
    <div class="tab-container">
      <div class="tab active" data-tab="account">帳戶登入</div>
      <div class="tab" data-tab="class">班級連結</div>
    </div>
    
    <!-- Account Login (高能力學生) -->
    <div id="account-section" class="form-section active">
      <div class="input-group">
        <label>學生 ID</label>
        <input type="text" id="login-id" placeholder="例如：zhang-junbao" />
      </div>
      <div class="input-group">
        <label>密碼</label>
        <input type="password" id="login-password" placeholder="輸入密碼" />
      </div>
      <button class="btn" id="login-btn" onclick="handleAccountLogin()">登入</button>
    </div>
    
    <!-- Class Link (中度/輕度Stage 1) -->
    <div id="class-section" class="form-section">
      <div id="step1-class" class="form-section active">
        <div class="input-group">
          <label>邀請碼</label>
          <input type="text" id="invite-code" placeholder="輸入6位邀請碼" maxlength="6" style="text-transform: uppercase; letter-spacing: 4px; text-align: center; font-size: 24px; font-weight: 700;" />
        </div>
        <button class="btn" onclick="handleCodeSubmit()">下一步</button>
      </div>
      
      <div id="step2-student" class="form-section">
        <div class="class-code-box">
          <div class="label">班級名稱</div>
          <div class="code" id="class-name">-</div>
        </div>
        <input type="hidden" id="selected-class-id" />
        <div class="input-group">
          <label>選擇你的名字</label>
          <select id="student-select">
            <option value="">-- 選擇學生 --</option>
          </select>
        </div>
        <button class="btn" onclick="handleStudentSelect()">開始學習</button>
      </div>
      
      <div id="step-loading" class="form-section">
        <div class="loading">
          <div class="spinner"></div>
          <div>載入中...</div>
        </div>
      </div>
    </div>
    
    <div class="back-link">
      <a href="/">返回首頁</a>
    </div>
  </div>
  
  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-section').classList.add('active');
        hideError();
      });
    });
    
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }
    
    function hideError() {
      document.getElementById('error-msg').classList.remove('show');
    }
    
    function showSection(id) {
      document.querySelectorAll('#class-section .form-section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    
    // Account login
    async function handleAccountLogin() {
      const id = document.getElementById('login-id').value.trim();
      const password = document.getElementById('login-password').value;
      
      if (!id || !password) {
        showError('請填寫所有欄位');
        return;
      }
      
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = '登入中...';
      hideError();
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id: id, password })
        });
        
        const data = await res.json();
        
        if (!data.success) {
          showError(data.error || '登入失敗');
          btn.disabled = false;
          btn.textContent = '登入';
          return;
        }
        
        // Save session and redirect
        localStorage.setItem('mathai_session', data.data.session_id);
        localStorage.setItem('mathai_student', JSON.stringify(data.data.student));
        localStorage.setItem('mathai_mode', 'account');
        
        window.location.href = '/pages/chat.html';
      } catch (err) {
        showError('網絡錯誤，請稍後再試');
        btn.disabled = false;
        btn.textContent = '登入';
      }
    }
    
    // Class link flow
    async function handleCodeSubmit() {
      const code = document.getElementById('invite-code').value.trim().toUpperCase();
      
      if (!code || code.length !== 6) {
        showError('請輸入6位邀請碼');
        return;
      }
      
      showSection('step-loading');
      hideError();
      
      try {
        const res = await fetch('/api/classes/by-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ invite_code: code })
        });
        
        const data = await res.json();
        
        if (!data.success) {
          showError(data.error || '無效的邀請碼');
          showSection('step1-class');
          return;
        }
        
        // Populate student select
        document.getElementById('class-name').textContent = data.data.name;
        document.getElementById('selected-class-id').value = data.data.id;
        
        const select = document.getElementById('student-select');
        select.innerHTML = '<option value="">-- 選擇學生 --</option>';
        
        data.data.students.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name;
          select.appendChild(opt);
        });
        
        showSection('step2-student');
      } catch (err) {
        showError('網絡錯誤，請稍後再試');
        showSection('step1-class');
      }
    }
    
    async function handleStudentSelect() {
      const studentId = document.getElementById('student-select').value;
      const classId = document.getElementById('selected-class-id').value;
      
      if (!studentId) {
        showError('請選擇你的名字');
        return;
      }
      
      try {
        const res = await fetch('/api/auth/guest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id: studentId, class_id: classId })
        });
        
        const data = await res.json();
        
        if (!data.success) {
          showError(data.error || '登入失敗');
          return;
        }
        
        // Save session and redirect
        localStorage.setItem('mathai_session', data.data.session_id);
        localStorage.setItem('mathai_student', JSON.stringify(data.data.student));
        localStorage.setItem('mathai_mode', 'guest');
        
        window.location.href = '/pages/chat.html';
      } catch (err) {
        showError('網絡錯誤，請稍後再試');
      }
    }
    
    // Check if already logged in
    const session = localStorage.getItem('mathai_session');
    if (session) {
      window.location.href = '/pages/chat.html';
    }
  </script>
</body>
</html>
