<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選擇你的名字 — MathAI</title>
  <link rel="stylesheet" href="/math-ai-platform/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    .class-header {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #4a90d9, #67b26f);
      color: white;
    }

    .class-name {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .class-subtitle {
      font-size: 18px;
      opacity: 0.9;
    }

    .class-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .instruction {
      text-align: center;
      font-size: 20px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    .student-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: var(--bg-white);
      border: 4px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.2s;
      min-height: 140px;
      text-decoration: none;
      color: var(--text-dark);
      box-shadow: var(--shadow-sm);
    }

    .student-btn:hover {
      border-color: var(--primary);
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
    }

    .student-btn:active {
      transform: translateY(-3px);
    }

    .student-btn-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .student-btn-name {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    .student-btn-ability {
      font-size: 12px;
      margin-top: 8px;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .ability-high {
      background: #d4edda;
      color: #155724;
    }

    .ability-medium {
      background: #fff3cd;
      color: #856404;
    }

    .ability-low {
      background: #cce5ff;
      color: #004085;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 40px;
      color: var(--primary);
      text-decoration: none;
      font-size: 16px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <div class="header-content">
          <a href="/math-ai-platform/" class="logo">
            <span class="logo-icon">🔢</span>
            <span>MathAI 數學助手</span>
          </a>
          <nav class="nav-links">
            <a href="/math-ai-platform/">主頁</a>
            <a href="/math-ai-platform/pages/dashboard.html">老師版</a>
          </nav>
        </div>
      </div>
    </header>

    <!-- Class Selection -->
    <main>
      <div class="class-header">
        <div class="class-name" id="class-name">P1A</div>
        <div class="class-subtitle">數學班</div>
      </div>

      <div class="class-content">
        <p class="instruction">請選擇你的名字 👇</p>

        <div class="student-grid" id="student-grid">
          <!-- 動態生成 -->
        </div>

<a href="/math-ai-platform/" class="back-link">← 返回主頁</a>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        MathAI 數學助手 — 匡智張玉瓊晨輝學校
      </div>
    </footer>
  </div>

  <script>
    // ========================================
    // URL 參數獲取班級ID
    // ========================================
    const params = new URLSearchParams(window.location.search);
    const classId = params.get('class') || 'P1A';

    document.getElementById('class-name').textContent = classId;

    // ========================================
    // Mock 學生名單（Phase 1 靜態數據）
    // 後期會從後端API獲取
    // ========================================
    const STUDENTS_BY_CLASS = {
      'P1A': [
        { id: 'p1a-01', name: '張鈞保', ability: 'high', icon: '👤' },
        { id: 'p1a-02', name: '陳大文', ability: 'medium', icon: '👤' },
        { id: 'p1a-03', name: '李小红', ability: 'medium', icon: '👤' },
        { id: 'p1a-04', name: '王小明', ability: 'low', icon: '👤' },
        { id: 'p1a-05', name: '陳志明', ability: 'medium', icon: '👤' }
      ],
      'P2A': [
        { id: 'p2a-01', name: '周芷若', ability: 'high', icon: '👤' },
        { id: 'p2a-02', name: '吳俊傑', ability: 'medium', icon: '👤' },
        { id: 'p2a-03', name: '孫文斌', ability: 'medium', icon: '👤' },
        { id: 'p2a-04', name: '鄭凱文', ability: 'low', icon: '👤' },
        { id: 'p2a-05', name: '何美琪', ability: 'medium', icon: '👤' }
      ],
      'S1B': [
        { id: 's1b-01', name: '祝卓鋒', ability: 'high', icon: '👤' },
        { id: 's1b-02', name: '黃曉明', ability: 'medium', icon: '👤' },
        { id: 's1b-03', name: '林志玲', ability: 'medium', icon: '👤' },
        { id: 's1b-04', name: '張偉豪', ability: 'low', icon: '👤' },
        { id: 's1b-05', name: '劉德華', ability: 'medium', icon: '👤' }
      ]
    };

    const ABILITY_LABELS = {
      'high': '🟢 高能力',
      'medium': '🟡 中度',
      'low': '🔵 輕度'
    };

    // ========================================
    // 渲染學生名單
    // ========================================
    function renderStudentGrid() {
      const grid = document.getElementById('student-grid');
      const students = STUDENTS_BY_CLASS[classId] || STUDENTS_BY_CLASS['P1A'];

      grid.innerHTML = students.map(s => `
        <a href="/math-ai-platform/pages/chat.html?student=${s.id}&class=${classId}" class="student-btn">
          <span class="student-btn-icon">${s.icon}</span>
          <span class="student-btn-name">${s.name}</span>
          <span class="student-btn-ability ability-${s.ability}">${ABILITY_LABELS[s.ability]}</span>
        </a>
      `).join('');
    }

    // ========================================
    // 語音提示（張鈞保適用）
    // ========================================
    function speak(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-HK';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    }

    // 頁面載入後朗讀提示
    window.addEventListener('load', () => {
      setTimeout(() => {
        speak('請選擇你的名字');
      }, 500);
    });

    renderStudentGrid();
  </script>
</body>
</html>
